name: APKTool Build Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  apktool-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install APKTool
      run: |
        sudo apt-get update
        sudo apt-get install -y wget
        wget https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -O apktool
        wget https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.3.jar -O apktool.jar
        chmod +x apktool
        sudo mv apktool apktool.jar /usr/local/bin/

    - name: Copy modified files from app to apktool workspace
      run: |
        # Список файлов для копирования (синхронизировано с build_magisk_module.sh)
        FILES_TO_COPY=(
            "app/src/main/res/layout/pager_item_aircondition.xml:apktool_workspace/modified/oneOS_Hvac/res/layout/pager_item_aircondition.xml"
        )
        
        echo "Copying modified files..."
        for file_pair in "${FILES_TO_COPY[@]}"; do
            IFS=':' read -r source_file dest_file <<< "$file_pair"
            
            if [ ! -f "$source_file" ]; then
                echo "Warning: file $source_file not found, skipping..."
                continue
            fi
            
            dest_dir=$(dirname "$dest_file")
            mkdir -p "$dest_dir"
            cp "$source_file" "$dest_file"
            echo "✓ Copied: $source_file -> $dest_file"
        done

    - name: Build APK with APKTool
      run: |
        BUILD_DIR="apktool_workspace/modified/oneOS_Hvac"
        
        if [ ! -d "$BUILD_DIR" ]; then
            echo "Error: directory $BUILD_DIR not found!"
            exit 1
        fi
        
        echo "Building APK from $BUILD_DIR..."
        apktool b "$BUILD_DIR" -o oneOS_Hvac_unsigned.apk
        
        if [ ! -f "oneOS_Hvac_unsigned.apk" ]; then
            echo "Error: APK file was not created!"
            exit 1
        fi
        
        echo "✓ APK build successful"
        ls -lh oneOS_Hvac_unsigned.apk
